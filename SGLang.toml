# =============================================================================
# SGLang.toml — Dynamo frontend + dynamo.sglang worker, SGLang's native
# --enable-lmcache flag (LMCache running *inside* the SGLang process, NOT a
# coordinated Dynamo<->LMCache connector — see SGLang_main.py docstring).
#
# Deploy with:
#   python deploy.py SGLang.toml
#
# This file gets copied to ./cerebrium.toml by deploy.py immediately before
# `cerebrium deploy -y` runs, then the original cerebrium.toml (if any) is
# restored afterwards. SGLang_main.py and dynamo_common.py must sit next to
# this file in the project directory — both are picked up by `include`.
# =============================================================================

[cerebrium.deployment]
name = "dynamo-sglang-lmcache"
python_version = "3.12"
disable_auth = false
include = ["SGLang_main.py", "dynamo_common.py", "cerebrium.toml"]
exclude = [".*"]
use_uv = true
docker_base_image_url = "lmsysorg/sglang:latest-cu130-runtime"

[pip]
args = ["--python $(command -v python)", "--compile-bytecode"]

# --- Pre-build commands -----------------------------------------------------
# Runs first, before any dependency installation (apt packages below install
# right after this, per Cerebrium's documented build order). Only the Rust
# toolchain install lives here — apt packages are declared in
# [cerebrium.dependencies.apt] instead, so they aren't double-installed.
pre_build_commands = [
  "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y",
]

# --- Shell commands ----------------------------------------------------------
# Runs last, after pip/apt/conda deps and code copy. The exotic installs
# (custom index URLs, --pre, --torch-backend) can't be expressed in the
# declarative [cerebrium.dependencies.pip] table below, so they live here —
# same uv invocations as the Modal image's .uv_pip_install() chain, just run
# as raw shell instead of Modal's Image builder API.
shell_commands = [
  "export PATH=/root/.cargo/bin:$PATH",
  "uv pip install --upgrade pip uv",
  "uv pip install 'huggingface-hub>=0.36.0' requests 'setuptools~=80.10.2' wheel setuptools-rust distro",
  "uv pip install --upgrade --index-url https://download.pytorch.org/whl/cu130 numpy 'torch~=2.11.0' 'torchvision~=0.26.0' 'torchaudio~=2.11.0' 'torchao~=0.17.0' 'torchcodec~=0.11.1'",
  "uv pip install cupy-cuda13x nixl-cu13",
  "uv pip install --pre --torch-backend=cu130 --index-strategy unsafe-best-match --extra-index-url https://docs.sglang.ai/whl/cu130 --extra-index-url https://download.pytorch.org/whl/cu130 'sglang[all]' sgl-deep-gemm",
  "uv pip install --pre --torch-backend=cu130 --index-strategy unsafe-best-match --extra-index-url https://docs.sglang.ai/whl/cu130 --extra-index-url https://download.pytorch.org/whl/cu130 'ai-dynamo[sglang]' lmcache",
]

[cerebrium.runtime.custom]
port = 8000
entrypoint = ["python3", "SGLang_main.py"]
healthcheck_endpoint = "/health"
readycheck_endpoint = "/health"

[cerebrium.hardware]
cpu = 4
memory = 48.0
compute = "ADA_L40"
gpu_count = 1
provider = "aws"
region = "us-east-1"

[cerebrium.scaling]
min_replicas = 0
max_replicas = 1
replica_concurrency = 10
response_grace_period = 3600
cooldown = 1800
scaling_metric = "concurrency_utilization"
scaling_target = 100
roll_out_duration_seconds = 0

[cerebrium.dependencies.apt]
clang = "latest"
llvm = "latest"
"pkg-config" = "latest"
"libssl-dev" = "latest"

[cerebrium.dependencies.pip]
# Left empty deliberately — every Python dependency above needs a custom
# index URL, --pre, or --torch-backend flag that this declarative table
# can't express, so they're all installed via shell_commands instead.
# Anything added here installs via plain `pip`/`uv pip install <pkg>==<ver>`
# with no extra flags.

# =============================================================================
# NOTE ON ENVIRONMENT VARIABLES — there is no [cerebrium.environment] table
# in cerebrium.toml. All runtime config below (model name/revision, ports,
# LMCache sizing, torch/HF env vars, etc.) is instead given sane defaults
# directly in SGLang_main.py via os.environ.get(KEY, default), so this
# deploys correctly with zero extra setup.
#
# To override any of these without editing code, or to set HF_TOKEN, add
# them under this Cerebrium project's dashboard -> Secrets (non-sensitive
# values can go in the adjacent "Environment Variables" panel instead) —
# both are injected into the container as plain env vars, equivalent to
# Modal's modal.Secret.from_name("huggingface-secret"):
#   HF_TOKEN                     — required only for gated HF models
#   MODEL_NAME                   default: Qwen/Qwen3.6-35B-A3B-FP8
#   MODEL_REVISION                default: 95a723d08a9490559dae23d0cff1d9466213d989
#   N_GPUS                        default: 1
#   MAX_INPUTS                    default: 1000
#   SGLANG_FRONTEND_PORT          default: 8000  (must match [cerebrium.runtime.custom].port if changed)
#   SGLANG_SYSTEM_PORT            default: 8081
#   LMCACHE_MAX_LOCAL_CPU_GB      default: 20
#   SGLANG_ENABLE_JIT_DEEPGEMM    default: 0  (set "1" to compile DeepGEMM at first
#                                 cold start — Hopper/sm_90+ only; see
#                                 SGLang_main.py's compile_deep_gemm_if_needed())
# =============================================================================
